version: '3.8'

services:
  web:
    build: .
    container_name: flask_hotel_app
    ports:
      - "81:81"
    volumes:
      - .:/app
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - SECRET_KEY=una_clave_secreta_muy_segura_123
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB:-master_db}
    restart: always
    networks:
      - coolify

  postgres-db:
    image: 'postgres:18-alpine'
    container_name: postgres_prod_central
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    environment:
      POSTGRES_USER: '${POSTGRES_USER:-admin}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB:-master_db}'
      TZ: America/Bogota
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-admin} -d $${POSTGRES_DB:-master_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  postgres-backup:
    image: 'prodrigestivill/postgres-backup-local:18-alpine'
    container_name: postgres_backup_sidecar
    restart: always
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_DB: '${POSTGRES_DB:-master_db}'
      POSTGRES_USER: '${POSTGRES_USER:-admin}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
      TZ: America/Bogota
    networks:
      - coolify

volumes:
  postgres_prod_data:
  postgres_backups:

networks:
  coolify:
    external: true
