version: '3.8'

services:
  web:
    build: .
    expose:
      - "81"
    volumes:
      - .:/app
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - SECRET_KEY=una_clave_secreta_muy_segura_123
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-master_db}
    restart: always
    networks:
      - coolify

  postgres-db:
    image: 'postgres:18-alpine'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    environment:
      POSTGRES_USER: '${POSTGRES_USER:-admin}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB:-master_db}'
      TZ: America/Bogota
    volumes:
      - postgres_prod_data:/var/lib/postgresql
    ports:
      - '5433:5432'
    networks:
      - coolify
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U admin -d master_db'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  postgres-backup:
    image: 'prodrigestivill/postgres-backup-local:18-alpine'
    restart: always
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_DB: '${POSTGRES_DB:-master_db}'
      POSTGRES_USER: '${POSTGRES_USER:-admin}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
      TZ: America/Bogota
    networks:
      - coolify

volumes:
  postgres_prod_data:
  postgres_backups:

networks:
  coolify:
    external: true
