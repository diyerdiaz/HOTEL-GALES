{% extends 'base.html' %}

{% block titulo_contenido %}Registrar Nueva Habitación{% endblock %}

{% block content %}
<div class="content-card">
  <div class="content-card-header">
    <h5 class="mb-0"><i class="bi bi-plus-square me-2"></i>Formulario de Registro</h5>
  </div>
  <div class="content-card-body">
    <form method="POST" class="row g-3">
      
      <div class="col-md-6">
        <label class="form-label fw-bold">Número de Habitación <small class="text-muted">(Máx. 4)</small></label>
        <input type="text" id="numeroHabitacion" name="numeroHabitacion" class="form-control" placeholder="Ej: 101" required maxlength="4" oninput="validarLongitud(this, 4, 'El número de habitación no puede tener más de 4 dígitos')">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-bold">Tipo de Habitación</label>
        <select name="idTipoHabitacion" class="form-select" required>
          <option value="" disabled selected>Seleccione el tipo...</option>
          {% for tipo in tipos %}
          <option value="{{ tipo.idTipoHabitacion }}">{{ tipo.nombreTipo }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-bold">Precio por Noche (COP) <small class="text-muted">(Máx. 6 dígitos)</small></label>
        <div class="input-group">
          <span class="input-group-text">COP $</span>
          <input type="number" id="precioNoche" step="1" name="precioNoche" class="form-control" placeholder="Máx. 999999" required oninput="validarLongitud(this, 6, 'El precio no puede tener más de 6 dígitos')">
        </div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-bold">Estado Inicial</label>
        <select name="estadoHabitacion" class="form-select">
          <option value="disponible" selected>Disponible</option>
          <option value="mantenimiento">Mantenimiento</option>
          <option value="limpieza">Limpieza</option>
        </select>
      </div>

      <div class="col-12 mt-4">
        <hr>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-hotel px-4">
            <i class="bi bi-save"></i> Guardar Habitación
          </button>
          <a href="{{ url_for('habitaciones.index') }}" class="btn btn-outline-secondary px-4">
            Cancelar
          </a>
        </div>
      </div>

    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function validarLongitud(input, max, mensaje) {
  if (input.value.length > max) {
    input.value = input.value.slice(0, max);
    Swal.fire({
      icon: 'warning',
      title: 'Atención',
      text: mensaje,
      confirmButtonColor: '#d4af37'
    });
  }
}
</script>
{% endblock %}
