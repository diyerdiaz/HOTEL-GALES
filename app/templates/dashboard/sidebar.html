<!-- Sidebar Navigation - Vertical Left Navbar -->
<nav class="sidebar-nav">
    
    <div class="sidebar-brand">
        <h3>Hotel</h3>
        
    </div>

    <ul class="sidebar-menu">
        <li>
            <a href="{{ url_for('auth.menu') }}" class="{% if request.endpoint == 'auth.menu' %}active{% endif %}">
                <i class="bi bi-house-door"></i>
                <span>Inicio</span>
            </a>
        </li>
        {% if current_user.es_administrador() %}
        <li>
            <a href="{{ url_for('usuarios.listar_usuarios') }}" class="{% if request.endpoint == 'usuarios.listar_usuarios' %}active{% endif %}">
                <i class="bi bi-people"></i>
                <span>Usuarios</span>
            </a>
        </li>
        {% endif %}
    </ul>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="sidebar-user-avatar">
                {{ current_user.usuario[0].upper() }}
            </div>
            <div class="sidebar-user-name">
                {{ current_user.usuario }}
            </div>
        </div>
        <a href="{{ url_for('auth.logout') }}" class="sidebar-logout">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </a>
    </div>
