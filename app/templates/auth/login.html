<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Gales - {{ _('Acceso de Personal') }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/lang-selector.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <!-- Language Switcher for Login -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; align-items: center;">
        <!-- Dark Mode Toggle -->
        <button id="darkModeToggle" class="btn-premium-lang shadow-sm" style="width: 45px; height: 45px; justify-content: center; padding: 0;">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
        <div class="lang-dropdown">
            <button class="btn-premium-lang dropdown-toggle shadow-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-globe2"></i>
                {% if session.get('language', 'es') == 'es' %}
                    <span><span class="fi fi-es rounded-circle"></span> <span class="lang-text">Español</span></span>
                {% else %}
                    <span><span class="fi fi-us rounded-circle"></span> <span class="lang-text">English</span></span>
                {% endif %}
                <i class="bi bi-chevron-down chevron ms-1"></i>
            </button>
            <ul class="dropdown-menu lang-dropdown-menu">
                <li>
                    <a class="lang-dropdown-item {{ 'active' if session.get('language', 'es') == 'es' else '' }}" href="{{ url_for('auth.set_language', lang='es') }}">
                        <span class="fi fi-es rounded-circle"></span> Español
                    </a>
                </li>
                <li>
                    <a class="lang-dropdown-item {{ 'active' if session.get('language') == 'en' else '' }}" href="{{ url_for('auth.set_language', lang='en') }}">
                        <span class="fi fi-us rounded-circle"></span> English
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Lado izquierdo - Hotel y Título -->
            <div class="auth-image">
                <div class="auth-image-content">
                    <h2>Hotel Gales</h2>
                    <p>{{ _('Su escape de lujo comienza aquí') }}</p>
                </div>
            </div>

            <!-- Lado derecho - Formulario -->
            <div class="auth-form">
                <h1>{{ _('Bienvenido') }}</h1>
                <p class="subtitle">{{ _('Por favor, ingrese sus credenciales para continuar') }}</p>

                <form method="post" action="{{ url_for('auth.login') }}">
                    <div class="form-group">
                        <label for="usuario">{{ _('USUARIO') }}</label>
                        <input type="text" id="usuario" name="usuario" placeholder="{{ _('Ingrese su usuario') }}" required>
                    </div>

                    <div class="form-group">
                        <label for="password">{{ _('CONTRASEÑA') }}</label>
                        <input type="password" id="password" name="password" placeholder="{{ _('Ingrese su contraseña') }}" required>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" id="recordarme" name="recordarme">
                        <label for="recordarme">{{ _('Recordarme') }}</label>
                    </div>

                    <button type="submit" class="btn-auth">
                        <i class="bi bi-box-arrow-in-right"></i> {{ _('INICIAR SESIÓN') }}
                    </button>
                </form>

                <div class="auth-footer">
                    <p>{{ _('¿No tiene una cuenta?') }} 
                        <a href="{{ url_for('auth.register') }}">{{ _('Regístrese aquí') }}</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script>
        // --- NPROGRESS ---
        NProgress.configure({ showSpinner: false, speed: 500 });
        NProgress.start();
        window.onload = () => NProgress.done();

        // --- DARK MODE LOGIC ---
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        const icon = darkModeToggle.querySelector('i');

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }

        darkModeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            if (isDark) {
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
            } else {
                localStorage.setItem('theme', 'light');
                icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
            }
        });

        // --- SWEETALERT2 FLASH MESSAGES ---
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    Swal.fire({
                        title: "{{ '¡Hecho!' if category == 'success' else 'Atención' }}",
                        text: "{{ message }}",
                        icon: "{{ 'success' if category == 'success' else ('error' if category == 'danger' or category == 'error' else 'info') }}",
                        confirmButtonColor: '#d4af37',
                        background: document.body.classList.contains('dark-mode') ? '#1e293b' : '#fff',
                        color: document.body.classList.contains('dark-mode') ? '#fff' : '#111',
                        timer: 3500,
                        timerProgressBar: true
                    });
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
</body>
</html>
