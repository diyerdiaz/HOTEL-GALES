{% extends "base.html" %}

{% block titulo_pagina %}
Editar Usuario {{ user.nameUser }}
{% endblock %}

{% block content %}

<form action="{{ url_for('user.edit', id=user.idUser) }}" method="POST">

    <div class="form-group mb-3">
        <label for="nameUser">Nombre:</label>
        <input type="text" id="nameUser" name="nameUser" value="{{ user.nameUser }}" required class="form-control">
    </div>

    <div class="form-group mb-3">
        <label for="username">Usuario:</label>
        <input type="text" id="username" name="username" value="{{ user.username }}" required class="form-control">
    </div>

    <div class="form-group mb-3">
        <label for="email">Correo:</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required class="form-control">
    </div>

    <div class="form-group mb-3">
        <label for="passwordUser">Contraseña:</label>
        <input type="password" id="passwordUser" name="passwordUser" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Actualizar Usuario</button>

</form>

{% endblock %}
